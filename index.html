<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Apple Tart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { background: #0a0705; overflow: hidden; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; touch-action: none; }
  #rotate-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: #0a0705; color: #e8c89a;
    flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; text-align: center; gap: 16px;
  }
  #rotate-overlay .icon { font-size: 48px; animation: wiggle 1.5s ease-in-out infinite; }
  @keyframes wiggle { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
  @media (orientation: portrait) and (max-width: 1024px) {
    #rotate-overlay { display: flex; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div id="rotate-overlay">
  <div class="icon">📱</div>
  <div style="font-size: 24px; font-style: italic;">Rotate your device</div>
  <div style="font-family: 'Courier Prime', monospace; font-size: 13px; color: #7a6a5a;">Apple Tart plays best in landscape</div>
</div>
<script type="module" src="game.js"></script>
</body>
</html>
